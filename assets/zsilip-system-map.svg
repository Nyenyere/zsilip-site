<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 680" role="img" aria-labelledby="title desc"><title id="title">Zsilip architecture map</title><desc id="desc">Abstract map of an edge gateway with uplinks, policy layers, client observability, proof output and lab modules.</desc><defs><linearGradient id="panel" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#10293a"/><stop offset="1" stop-color="#241736"/></linearGradient><linearGradient id="core" x1="0" x2="1"><stop offset="0" stop-color="#20d6c7"/><stop offset="1" stop-color="#7b61ff"/></linearGradient><filter id="soft"><feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#03070d" flood-opacity=".28"/></filter></defs><rect width="1080" height="680" rx="38" fill="url(#panel)"/><g opacity=".23" stroke="#dff7ff" stroke-width="1"><path d="M70 106h940M70 212h940M70 318h940M70 424h940M70 530h940"/><path d="M158 70v540M318 70v540M478 70v540M638 70v540M798 70v540M958 70v540"/></g><g filter="url(#soft)"><rect x="374" y="230" width="332" height="206" rx="28" fill="#0d1524" stroke="url(#core)" stroke-width="3"/><text x="540" y="286" text-anchor="middle" fill="#f7fbff" font-family="Arial, sans-serif" font-size="36" font-weight="700">ZSILIP</text><text x="540" y="322" text-anchor="middle" fill="#b7c7da" font-family="Arial, sans-serif" font-size="18">edge policy and proof core</text><g fill="none" stroke="#20d6c7" stroke-width="5" stroke-linecap="round"><path d="M466 374h148"/><path d="M466 374c36-42 112-42 148 0"/><path d="M466 374c36 42 112 42 148 0"/></g><circle cx="466" cy="374" r="9" fill="#20d6c7"/><circle cx="614" cy="374" r="9" fill="#7b61ff"/></g><g font-family="Arial, sans-serif" font-size="17" font-weight="700"><g><rect x="76" y="88" width="236" height="92" rx="20" fill="#13243a" stroke="#2ec4b6"/><text x="104" y="128" fill="#f7fbff">Uplinks</text><text x="104" y="154" fill="#a7bdd3" font-size="14" font-weight="400">ethernet, wifi, mobile fallback</text></g><g><rect x="76" y="262" width="236" height="92" rx="20" fill="#13243a" stroke="#2ec4b6"/><text x="104" y="302" fill="#f7fbff">Local clients</text><text x="104" y="328" fill="#a7bdd3" font-size="14" font-weight="400">AP, DHCP, DNS, identity hints</text></g><g><rect x="76" y="438" width="236" height="92" rx="20" fill="#211b36" stroke="#9a7cff"/><text x="104" y="478" fill="#f7fbff">Temporal model</text><text x="104" y="504" fill="#a7bdd3" font-size="14" font-weight="400">awake, sleep, breaks, guards</text></g><g><rect x="768" y="88" width="236" height="92" rx="20" fill="#13243a" stroke="#2ec4b6"/><text x="796" y="128" fill="#f7fbff">Route truth</text><text x="796" y="154" fill="#a7bdd3" font-size="14" font-weight="400">scoring, failover, fallback</text></g><g><rect x="768" y="262" width="236" height="92" rx="20" fill="#211b36" stroke="#9a7cff"/><text x="796" y="302" fill="#f7fbff">Campaign lab</text><text x="796" y="328" fill="#a7bdd3" font-size="14" font-weight="400">controlled HTTP execution view</text></g><g><rect x="768" y="438" width="236" height="92" rx="20" fill="#13243a" stroke="#2ec4b6"/><text x="796" y="478" fill="#f7fbff">Proof plane</text><text x="796" y="504" fill="#a7bdd3" font-size="14" font-weight="400">read-only status and evidence</text></g></g><g fill="none" stroke-linecap="round" stroke-width="4"><path d="M312 134C376 134 346 274 374 274" stroke="#2ec4b6"/><path d="M312 308C350 308 338 333 374 333" stroke="#2ec4b6"/><path d="M312 484C378 484 344 392 374 392" stroke="#9a7cff"/><path d="M706 274C738 274 732 134 768 134" stroke="#2ec4b6"/><path d="M706 333C738 333 732 308 768 308" stroke="#9a7cff"/><path d="M706 392C740 392 728 484 768 484" stroke="#2ec4b6"/></g><g font-family="Arial, sans-serif" font-size="13" fill="#d7e9f7"><rect x="366" y="574" width="348" height="44" rx="22" fill="#0d1524" stroke="#2a465d"/><text x="540" y="602" text-anchor="middle">local-first prototype, not a public-cloud dependency</text></g></svg>
